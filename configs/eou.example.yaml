# eou.example.yaml — SPEC-MOUSE-001 MVP default configuration (Windows, HOST role)
#
# Copy this file to eou.yaml and adjust for your setup.
# Run: eou host eou.yaml   (on the HOST PC)
#      eou remote eou.yaml  (on the REMOTE PC with different role/endpoint)
#
# Known limitations:
#   - No encryption or authentication (LAN trust assumed — REQ-MOUSE-SECURITY Known Limitation).
#   - Anti-cheat / Secure Desktop may reject WH_MOUSE_LL hook installation (R-08).
#   - Single logical screen assumed; multi-monitor with negative virtual coords uses
#     (-32000, -32000) fallback if SM_XVIRTUALSCREEN is unavailable (R-07).

# Node role: "host" (has the physical keyboard/mouse) or "remote" (receives injected input).
role: host

# TCP endpoint of the *peer* node in "ip:port" format.
# HOST connects TO this address (the REMOTE PC must be listening).
endpoint: "192.168.1.5:7001"

# Edge detection configuration.
# threshold_px: cursor must be within this many pixels of the edge to count.
# dwell_ticks: cursor must remain within threshold for this many consecutive poll ticks.
edge:
  threshold_px: 2
  dwell_ticks: 2

# Takeback detection configuration (REMOTE side).
# pixel_threshold: cumulative non-injected movement (|dx|+|dy|) to trigger takeback.
# event_count_threshold: number of non-injected events within window to trigger.
# time_window_ms: rolling window duration in milliseconds.
takeback:
  pixel_threshold: 5
  event_count_threshold: 2
  time_window_ms: 100

# Whether to hide the HOST cursor while in CONTROLLING state.
# Uses SetCursorPos to park at virtual-screen corner + WH_MOUSE_LL to consume events.
# Set to false for debugging only.
hide_cursor: true
