# eou.remote.example.yaml — SPEC-MOUSE-001 MVP configuration for REMOTE role
#
# The REMOTE PC listens for the HOST connection, injects received input events
# via SendInput, and detects local takeback (physical mouse use on the REMOTE PC).
#
# Copy to eou.yaml on the REMOTE PC and run: eou remote eou.yaml
#
# Known limitations:
#   - No encryption or authentication (LAN trust assumed — REQ-MOUSE-SECURITY Known Limitation).
#   - Anti-cheat / Secure Desktop may reject SendInput injection (R-08).
#   - Single logical screen assumed; multi-monitor with negative virtual coords uses
#     (-32000, -32000) fallback if SM_XVIRTUALSCREEN is unavailable (R-07).

# Node role: this node receives injected input from the HOST.
role: remote

# TCP listen endpoint ("ip:port").
# REMOTE binds to this address and waits for the HOST to connect.
# Use 0.0.0.0 to accept connections on any interface, or pin to a specific LAN IP.
endpoint: "0.0.0.0:7001"

# Edge detection (unused on REMOTE but kept for symmetric config parsing).
edge:
  threshold_px: 2
  dwell_ticks: 2

# Takeback detection configuration (REMOTE side).
# pixel_threshold: cumulative non-injected movement (|dx|+|dy|) that triggers takeback.
# event_count_threshold: number of non-injected events within the window to trigger.
# time_window_ms: rolling window duration in milliseconds.
takeback:
  pixel_threshold: 5
  event_count_threshold: 2
  time_window_ms: 100

# hide_cursor has no effect on REMOTE (cursor is controlled by injected events).
# Kept for symmetric config parsing.
hide_cursor: true
